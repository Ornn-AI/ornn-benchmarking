# Publish — Build and upload ornn-bench to PyPI on every push to main.
#
# Uses PyPI Trusted Publishing (OIDC) — no API token required.
# Prerequisite: A Trusted Publisher entry must exist on PyPI for
#   Owner: Ornn-AI, Repository: ornn-benchmarking, Workflow: publish.yml
#
# Free-tier-safe:
#   - Uses GitHub-hosted ubuntu-latest runners (free for public repos)
#   - No paid features, external services, or secrets required

name: Publish to PyPI

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tool
        run: python -m pip install --upgrade build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
